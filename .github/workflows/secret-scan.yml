name: Secret Scan (TruffleHog)

# Public repo hosting OAuth callback HTML. No secrets should ever land here —
# this gate fails the build if a verified credential is committed.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  trufflehog:
    name: TruffleHog verified-secrets gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # Direct invocation, not the trufflesecurity/trufflehog action wrapper:
      # the wrapper auto-injects --fail and --no-update, which collide with
      # any flag list we'd want to pass and have proven brittle in practice.
      - name: Install TruffleHog
        run: |
          curl -sSfL https://raw.githubusercontent.com/trufflesecurity/trufflehog/main/scripts/install.sh \
            | sudo sh -s -- -b /usr/local/bin

      - name: Scan working tree for verified secrets
        run: trufflehog filesystem --only-verified --fail --no-update .
