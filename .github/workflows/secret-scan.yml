name: Secret Scan (TruffleHog)

# Public repo hosting OAuth callback HTML. No secrets should ever land here —
# this gate fails the build if a verified credential is committed.
# Mirrors the secret-scan job in Haste-NYC/haste-conform CI.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  trufflehog:
    name: TruffleHog verified-secrets gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: TruffleHog scan
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified --fail --no-update
