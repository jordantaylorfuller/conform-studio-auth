<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conform Studio</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh; background: #000000; color: #ffffff;
        }
        .container { text-align: center; max-width: 320px; width: 90%; }
        .logo { height: 14px; width: auto; opacity: 0.7; margin-bottom: 48px; }
        .spinner {
            display: inline-block; width: 20px; height: 20px; margin: 0 auto 20px;
            border: 1.5px solid rgba(255,255,255,0.08);
            border-top: 1.5px solid rgba(255,255,255,0.3);
            border-radius: 50%; animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .status { font-size: 12px; color: rgba(255,255,255,0.25); }
        .hint { font-size: 11px; color: rgba(255,255,255,0.15); margin-top: 6px; }
        .icon { width: 32px; height: 32px; margin: 0 auto 20px; opacity: 0.5; }
        .icon svg { width: 100%; height: 100%; }
        .message { font-size: 13px; color: rgba(255,255,255,0.5); }
        .detail { font-size: 11px; color: rgba(255,255,255,0.2); margin-top: 8px; }
        .sub { font-size: 11px; color: rgba(255,255,255,0.25); margin-top: 16px; cursor: pointer; background: none; border: none; font-family: inherit; }
        .sub:hover { color: rgba(255,255,255,0.4); }
        .manual-link { font-size: 11px; color: rgba(255,255,255,0.25); margin-top: 16px; text-decoration: none; display: none; }
        .manual-link:hover { color: rgba(255,255,255,0.4); }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="container">
        <img src="https://cdn.builder.io/api/v1/image/assets%2F25af603265884417b23b761757dff1ec%2F2c25ef9dc2684d0187030022dab8721e?format=webp&width=800" alt="Conform Studio" class="logo" />

        <div id="loading-state">
            <div class="spinner"></div>
            <p class="status">Completing authentication...</p>
        </div>

        <div id="success-state" class="hidden">
            <p class="status">Sign in successful</p>
            <p class="hint">You can close this tab</p>
            <a id="manual-return" href="#" class="manual-link">Open Conform Studio</a>
        </div>

        <div id="error-state" class="hidden">
            <div class="icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 18L18 6M6 6l12 12"/></svg>
            </div>
            <p class="message">Authentication failed</p>
            <p class="detail" id="error-message">An error occurred during authentication.</p>
            <button onclick="window.close()" class="sub">Close this tab</button>
        </div>

        <div id="invalid-state" class="hidden">
            <div class="icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 18L18 6M6 6l12 12"/></svg>
            </div>
            <p class="message">Invalid request</p>
            <p class="detail">No authentication data was received. Please try signing in again from Conform Studio.</p>
            <button onclick="window.close()" class="sub">Close this tab</button>
        </div>
    </div>

    <script>
        const DEEP_LINK_SCHEME = 'conformstudio://';
        const REDIRECT_DELAY = 1500;

        const loadingState = document.getElementById('loading-state');
        const successState = document.getElementById('success-state');
        const errorState = document.getElementById('error-state');
        const invalidState = document.getElementById('invalid-state');
        const errorMessage = document.getElementById('error-message');
        const successMessage = document.getElementById('success-message');
        const manualReturnButton = document.getElementById('manual-return');

        function hideAllStates() {
            loadingState.classList.add('hidden');
            successState.classList.add('hidden');
            errorState.classList.add('hidden');
            invalidState.classList.add('hidden');
        }

        function getHashParams() {
            const hash = window.location.hash.substring(1);
            return new URLSearchParams(hash);
        }

        const urlParams = new URLSearchParams(window.location.search);
        const hashParams = getHashParams();

        const code = urlParams.get('code');
        const error = urlParams.get('error');
        const errorDescription = urlParams.get('error_description');
        const accessToken = hashParams.get('access_token');
        const tokenType = hashParams.get('token_type');
        const type = hashParams.get('type');

        function handleSuccess(message) {
            let deepLink = DEEP_LINK_SCHEME;
            if (code) {
                deepLink += `auth-callback?code=${encodeURIComponent(code)}`;
            } else if (accessToken) {
                deepLink += `auth-verified`;
            }

            manualReturnButton.href = deepLink;

            setTimeout(() => {
                hideAllStates();
                successState.classList.remove('hidden');
            }, REDIRECT_DELAY);

            setTimeout(() => {
                window.location.href = deepLink;
            }, REDIRECT_DELAY + 500);

            setTimeout(() => {
                manualReturnButton.style.display = 'inline-block';
            }, 3000);
        }

        function handleError(err, description) {
            hideAllStates();
            errorState.classList.remove('hidden');

            if (description) {
                errorMessage.textContent = description;
            } else if (err === 'access_denied') {
                errorMessage.textContent = 'Authentication was cancelled or denied.';
            } else {
                errorMessage.textContent = `Error: ${err}`;
            }
        }

        function handleInvalid() {
            hideAllStates();
            invalidState.classList.remove('hidden');
        }

        if (error) {
            handleError(error, errorDescription);
        } else if (code) {
            handleSuccess('OAuth authentication successful!');
        } else if (accessToken && tokenType) {
            handleSuccess();
        } else {
            handleInvalid();
        }

        document.addEventListener('visibilitychange', () => {
            if (!document.hidden && (code || accessToken) && successState.classList.contains('hidden')) {
                hideAllStates();
                successState.classList.remove('hidden');
            }
        });

        history.pushState(null, null, location.href);
        window.onpopstate = function () {
            history.go(1);
        };
    </script>
</body>
</html>
