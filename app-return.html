<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conform Studio</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh; background: #000000; color: #ffffff;
        }
        .container { text-align: center; max-width: 320px; width: 90%; }
        .logo { height: 14px; width: auto; opacity: 0.7; margin-bottom: 48px; }
        .icon { width: 32px; height: 32px; margin: 0 auto 20px; opacity: 0.5; }
        .icon svg { width: 100%; height: 100%; }
        .status { font-size: 12px; color: rgba(255,255,255,0.25); }
        .hint { font-size: 11px; color: rgba(255,255,255,0.15); margin-top: 6px; }
    </style>
</head>
<body>
    <div class="container">
        <img src="https://cdn.builder.io/api/v1/image/assets%2F25af603265884417b23b761757dff1ec%2F2c25ef9dc2684d0187030022dab8721e?format=webp&width=800" alt="Conform Studio" class="logo" />

        <div id="success-state">
            <div class="icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
            </div>
            <p class="status" id="status-message">You can close this tab and return to Conform Studio.</p>
        </div>
    </div>

    <script>
        var params = new URLSearchParams(window.location.search);
        var checkout = params.get('checkout');
        var statusEl = document.getElementById('status-message');

        if (checkout === 'success') {
            statusEl.textContent = 'Payment received. You can close this tab and return to Conform Studio.';
        } else if (checkout === 'cancelled') {
            statusEl.textContent = 'Checkout cancelled. You can close this tab and return to Conform Studio.';
        }
    </script>
</body>
</html>
